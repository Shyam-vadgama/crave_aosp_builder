name: 🖥️ Crave Exec (Run Custom Commands)

on:
  workflow_dispatch:
    inputs:
      folder:
        description: 'Project folder'
        type: choice
        options:
          - Lineage23
          - PixelOS
          - Matrixx16
          - (fresh) custom
        default: Lineage23
      repo_url:
        description: 'Repo URL (for fresh folder)'
        type: string
        default: 'https://github.com/LineageOS/android.git'
      repo_branch:
        description: 'Repo branch (for fresh folder)'
        type: string
        default: 'lineage-23.2'
      command:
        description: 'Command to run'
        type: string
        default: 'ls -la out/target/product/warm/'

concurrency:
  group: crave-warm
  cancel-in-progress: false

jobs:
  exec:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup crave
        run: |
          sudo curl -sL "https://github.com/accupara/crave/releases/download/0.2-7220/crave-0.2-7220-linux-amd64.bin" -o /usr/local/bin/crave
          sudo chmod +x /usr/local/bin/crave
          cat > ~/crave.conf << EOF
          { "username": "${{ secrets.CRAVE_USERNAME }}", "headers": { "Content-Type": "application/json", "Authorization": "${{ secrets.CRAVE_TOKEN }}", "User-Agent": "Crave" }, "projects": [], "server": "https://foss.crave.io/api" }
          EOF

      - name: Install repo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo

      - name: Setup project
        run: |
          sudo mkdir -p /crave-devspaces
          sudo chmod 777 /crave-devspaces
          if [ "${{ inputs.folder }}" = "(fresh) custom" ]; then
            mkdir -p /crave-devspaces/custom
            cd /crave-devspaces/custom
            repo init -u ${{ inputs.repo_url }} -b ${{ inputs.repo_branch }} --git-lfs --depth=1
          else
            mkdir -p /crave-devspaces/${{ inputs.folder }}
            cd /crave-devspaces/${{ inputs.folder }}
            case "${{ inputs.folder }}" in
              Lineage23) repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs --depth=1 ;;
              PixelOS)   repo init -u https://github.com/PixelOS-AOSP/android_manifest.git -b sixteen-qpr2 --git-lfs --depth=1 ;;
              Matrixx16) repo init -u https://github.com/ProjectMatrixx/android.git -b 16.2 --git-lfs --depth=1 ;;
            esac
          fi

      - name: ▶️ Run command on crave
        run: |
          FOLDER="${{ inputs.folder }}"
          [ "$FOLDER" = "(fresh) custom" ] && FOLDER=custom
          cd /crave-devspaces/$FOLDER
          echo "▶️ Running: ${{ inputs.command }}"
          echo "──────────────────────────────────────"
          crave run --no-patch -- "${{ inputs.command }}"
