name: 🏗️ Build LineageOS 23.2 for warm (crave.io)

on:
  workflow_dispatch:
    inputs:
      clean:
        description: 'Clean build?'
        type: boolean
        default: false

concurrency:
  group: crave-warm
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4

      - name: Setup crave
        run: |
          sudo curl -sL "https://github.com/accupara/crave/releases/download/0.2-7220/crave-0.2-7220-linux-amd64.bin" -o /usr/local/bin/crave
          sudo chmod +x /usr/local/bin/crave
          cat > ~/crave.conf << EOF
          {
            "username": "${{ secrets.CRAVE_USERNAME }}",
            "headers": {
              "Content-Type": "application/json",
              "Authorization": "${{ secrets.CRAVE_TOKEN }}",
              "User-Agent": "Crave"
            },
            "projects": [],
            "server": "https://foss.crave.io/api"
          }
          EOF

      - name: Install repo
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo

      - name: Setup project folder
        run: |
          sudo mkdir -p /crave-devspaces
          sudo chmod 777 /crave-devspaces
          mkdir -p /crave-devspaces/Lineage23
          cd /crave-devspaces/Lineage23
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs --depth=1

      - name: 🏗️ Build ROM on crave.io
        run: |
          cd /crave-devspaces/Lineage23
          crave run --no-patch -- "rm -rf .repo/local_manifests; \
          repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs --depth=1; \
          git clone https://github.com/shyam-vadgama/local_manifest/ -b lineage-23.2 .repo/local_manifests; \
          /opt/crave/resync.sh; \
           source build/envsetup.sh; \
           lunch lineage_warm-bp4a-userdebug || lunch lineage_warm-ap4a-userdebug || lunch lineage_warm-userdebug; \
           brunch warm"

      - name: 📥 Pull build artifacts
        if: success()
        run: |
          cd /crave-devspaces/Lineage23
          mkdir -p out/target/product/warm
          crave pull out/target/product/warm/ -d out/target/product/warm/

      - name: 📦 Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /crave-devspaces/Lineage23
          TAG="lineage-23.2-$(date +'%Y%m%d-%H%M')"
          gh release create "$TAG" out/target/product/warm/*.zip \
            --repo ${{ github.repository }} \
            --title "LineageOS 23.2 for warm ($TAG)" \
            --notes "Automated build via crave.io"
